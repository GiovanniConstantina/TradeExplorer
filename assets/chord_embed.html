<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Embed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0d0f14;
  overflow: hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#main-svg {
  display:block;
  max-width:100%;
  max-height:100vh;
  cursor: grab;
}
#main-svg:active {
  cursor: grabbing;
}
#tooltip {
  display:none;
  position:fixed;
  z-index:100;
  background:rgba(13,15,20,0.95);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;
  padding:10px 14px;
  pointer-events:none;
  font-family:'Inter',sans-serif;
  font-size:12px;
  color:#e8eaf0;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.tt-route { font-weight:600; margin-bottom:4px; font-size:13px; }
.tt-val { color:#3b82f6; font-size:15px; font-weight:600; }
.tt-region { color:#9499a8; font-size:10px; margin-top:4px; font-family:monospace; letter-spacing:0.05em; }
</style>
</head>
<body>
<svg id="main-svg" viewBox="0 0 640 640"></svg>
<div id="tooltip"></div>

<script>
const ALL_FLOWS = [
  ["CAN","USA",109052448614],
  ["RUS","CHN",45693809337],
  ["USA","MEX",41980736585],
  ["RUS","NLD",33510802679],
  ["NOR","GBR",32927230351],
  ["NOR","DEU",31249677467],
  ["NLD","DEU",27300000144],
  ["USA","CAN",22771082446],
  ["AGO","CHN",20022774116],
  ["IDN","CHN",17806603010],
  ["USA","KOR",16072855462],
  ["AUS","JPN",15446498709],
  ["USA","CHN",15397138049],
  ["BRA","CHN",14320913546],
  ["USA","BRA",13890004494],
  ["USA","IND",13673103747],
  ["GBR","NLD",13537007069],
  ["NLD","BEL",13250954297],
  ["QAT","CHN",12306770148],
  ["RUS","DEU",12230904227],
  ["USA","NLD",12119226689],
  ["RUS","KOR",11882183988],
  ["USA","JPN",11744956997],
  ["QAT","JPN",11604548789],
  ["NOR","FRA",10911306916],
  ["QAT","KOR",10866834285],
  ["AUS","IND",9869284106],
  ["NOR","BEL",9867577772],
  ["BEL","NLD",9749209495],
  ["QAT","IND",9738961700],
  ["AZE","ITA",9190668349],
  ["RUS","USA",8950848128],
  ["IRN","CHN",8849729022],
  ["KAZ","ITA",8675597211],
  ["NOR","NLD",8497044765],
  ["SGP","MYS",8342367126],
  ["RUS","POL",8322342940],
  ["USA","GBR",8231969972],
  ["BEL","FRA",7943547877],
  ["NGA","IND",7637005248],
  ["AUS","KOR",7518578317],
  ["CHN","HKG",7487925429],
  ["KOR","CHN",7477774212],
  ["NOR","SWE",7441458089],
  ["RUS","BLR",7020964491],
  ["RUS","TUR",6850108942],
  ["SGP","IDN",6786722275],
  ["RUS","JPN",6521780930],
  ["RUS","ITA",6518438367],
  ["NOR","CHN",6413001352]
];

const REGIONS = {
  AGO:"Africa",
  AUS:"Asia/Pacific",
  AZE:"Africa",
  BEL:"Europe/CIS",
  BLR:"Europe/CIS",
  BRA:"Americas",
  CAN:"Americas",
  CHN:"Asia/Pacific",
  DEU:"Europe/CIS",
  FRA:"Europe/CIS",
  GBR:"Europe/CIS",
  HKG:"Asia/Pacific",
  IDN:"Asia/Pacific",
  IND:"Asia/Pacific",
  IRN:"Middle East",
  ITA:"Europe/CIS",
  JPN:"Asia/Pacific",
  KAZ:"Africa",
  KOR:"Asia/Pacific",
  MEX:"Americas",
  MYS:"Asia/Pacific",
  NGA:"Africa",
  NLD:"Europe/CIS",
  NOR:"Europe/CIS",
  POL:"Europe/CIS",
  QAT:"Middle East",
  RUS:"Europe/CIS",
  SGP:"Asia/Pacific",
  SWE:"Europe/CIS",
  TUR:"Asia/Pacific",
  USA:"Americas"
};

const COUNTRY_NAMES = {
  AGO:"Angola",
  AUS:"Australia",
  AZE:"Azerbaijan",
  BEL:"Belgium",
  BLR:"Belarus",
  BRA:"Brazil",
  CAN:"Canada",
  CHN:"China",
  DEU:"Germany",
  FRA:"France",
  GBR:"United Kingdom",
  HKG:"Hong Kong",
  IDN:"Indonesia",
  IND:"India",
  IRN:"Iran",
  ITA:"Italy",
  JPN:"Japan",
  KAZ:"Kazakhstan",
  KOR:"South Korea",
  MEX:"Mexico",
  MYS:"Malaysia",
  NGA:"Nigeria",
  NLD:"Netherlands",
  NOR:"Norway",
  POL:"Poland",
  QAT:"Qatar",
  RUS:"Russia",
  SGP:"Singapore",
  SWE:"Sweden",
  TUR:"Turkey",
  USA:"United States"
};

const REGION_COLORS = {
  "Americas":     ["#ef4444","#f87171","#dc2626","#fca5a5","#b91c1c"],
  "Europe/CIS":   ["#3b82f6","#60a5fa","#2563eb","#93c5fd","#1d4ed8"],
  "Middle East":  ["#f59e0b","#fbbf24","#d97706","#fcd34d","#b45309"],
  "Asia/Pacific": ["#10b981","#34d399","#059669","#6ee7b7","#047857"],
  "Africa":       ["#a855f7","#c084fc","#9333ea","#d8b4fe","#7e22ce"],
};

const regionCounters = {};
const assignedColors = {};
function getNodeColor(n) {
  if (assignedColors[n]) return assignedColors[n];
  const reg = REGIONS[n] || "Africa";
  regionCounters[reg] = regionCounters[reg] || 0;
  const pal = REGION_COLORS[reg];
  assignedColors[n] = pal[regionCounters[reg] % pal.length];
  regionCounters[reg]++;
  return assignedColors[n];
}
[...new Set(ALL_FLOWS.flatMap(d => [d[0], d[1]]))].forEach(getNodeColor);

function getFilteredFlows(region) {
  if (region === "All") {
    const totals = {};
    ALL_FLOWS.forEach(([s,t,v]) => {
      totals[s] = (totals[s] || 0) + v;
      totals[t] = (totals[t] || 0) + v;
    });
    const top15 = Object.entries(totals)
      .sort((a,b) => b[1] - a[1])
      .slice(0,15)
      .map(d => d[0]);
    const s = new Set(top15);
    return ALL_FLOWS.filter(([src,tgt]) => s.has(src) && s.has(tgt));
  }

  const regionNodes = new Set(
    Object.entries(REGIONS).filter(([,r]) => r === region).map(([n]) => n)
  );
  return ALL_FLOWS.filter(([s,t]) => regionNodes.has(s) || regionNodes.has(t));
}

let focusedNode = null;

function drawChord(region) {
  const flows = getFilteredFlows(region);
  const svg = d3.select("#main-svg");
  svg.selectAll("*").remove();

  const W = 640, H = 640, CX = W / 2, CY = H / 2;
  const outerR = 220, innerR = 198;

  const nodeSet = [...new Set(flows.flatMap(d => [d[0], d[1]]))];
  const N = nodeSet.length;
  if (N < 2) return;

  const nodeIndex = Object.fromEntries(nodeSet.map((n,i) => [n,i]));

  const matrix = Array.from({length:N}, () => new Array(N).fill(0));
  flows.forEach(([s,t,v]) => {
    const si = nodeIndex[s], ti = nodeIndex[t];
    if (si !== undefined && ti !== undefined) {
      matrix[si][ti] += Math.log1p(v);
    }
  });

  const chord = d3.chord().padAngle(0.022).sortSubgroups(d3.descending);
  const chords = chord(matrix);

  const arcGen = d3.arc().innerRadius(innerR).outerRadius(outerR);
  const ribbonGen = d3.ribbon().radius(innerR - 4);

  const zoomLayer = svg.append("g");
  const g = zoomLayer.append("g").attr("transform", `translate(${CX},${CY})`);

  const zoom = d3.zoom()
    .scaleExtent([0.8, 3])
    .on("zoom", (event) => {
      zoomLayer.attr("transform", event.transform);
    });

  svg.call(zoom);

  g.append("circle")
    .attr("r", outerR + 50)
    .attr("fill", "rgba(255,255,255,0.02)");

  const ribbonG = g.append("g");

  ribbonG.selectAll("path")
    .data(chords)
    .join("path")
    .attr("d", ribbonGen)
    .attr("fill", d => assignedColors[nodeSet[d.source.index]])
    .attr("stroke", "rgba(255,255,255,0.08)")
    .attr("stroke-width", 0.5)
    .attr("opacity", 0)
    .transition()
    .duration(600)
    .delay((_,i) => i * 12)
    .attr("opacity", 0.35);

  ribbonG.selectAll("path")
    .on("mouseover", function(event, d) {
      const src = nodeSet[d.source.index];
      const tgt = nodeSet[d.target.index];
      const flow = flows.find(([s,t]) => s === src && t === tgt);
      const val = flow ? flow[2] : 0;
      const fmt = `$${(val / 1e9).toFixed(1)}B`;

      d3.select(this)
        .attr("opacity", 0.85)
        .attr("stroke", "white")
        .attr("stroke-width", 1.5);

      const tt = document.getElementById("tooltip");
      tt.style.display = "block";
      tt.innerHTML = `
        <div class="tt-route">${COUNTRY_NAMES[src] || src} → ${COUNTRY_NAMES[tgt] || tgt}</div>
        <div class="tt-val">${fmt}</div>
        <div class="tt-region">${REGIONS[src] || ''}</div>
      `;
      tt.style.left = (event.clientX + 16) + "px";
      tt.style.top = (event.clientY - 20) + "px";
    })
    .on("mousemove", function(event) {
      const tt = document.getElementById("tooltip");
      tt.style.left = (event.clientX + 16) + "px";
      tt.style.top = (event.clientY - 20) + "px";
    })
    .on("mouseout", function() {
      applyFocus();
      document.getElementById("tooltip").style.display = "none";
    });

  const arcG = g.append("g");

  const groups = arcG.selectAll("g")
    .data(chords.groups)
    .join("g")
    .style("cursor", "pointer")
    .on("click", function(event, d) {
      const name = nodeSet[d.index];
      focusedNode = focusedNode === name ? null : name;
      applyFocus();
    });

  groups.append("path")
    .attr("d", arcGen)
    .attr("fill", d => assignedColors[nodeSet[d.index]])
    .attr("stroke", d => assignedColors[nodeSet[d.index]])
    .attr("stroke-width", 0.5)
    .attr("opacity", 0)
    .transition()
    .duration(500)
    .attr("opacity", 1);

  groups.append("path")
    .attr("d", d3.arc().innerRadius(outerR + 4).outerRadius(outerR + 8))
    .attr("fill", d => assignedColors[nodeSet[d.index]])
    .attr("opacity", 0.25);

  groups.append("text")
    .each(d => { d.angle = (d.startAngle + d.endAngle) / 2; })
    .attr("dy", "0.35em")
    .attr("transform", d => `
      rotate(${d.angle * 180 / Math.PI - 90})
      translate(${outerR + 12})
      ${d.angle > Math.PI ? "rotate(180)" : ""}
    `)
    .attr("text-anchor", d => d.angle > Math.PI ? "end" : "start")
    .attr("fill", "#e8eaf0")
    .attr("font-family", "'Inter',sans-serif")
    .attr("font-size", "11px")
    .attr("font-weight", "600")
    .attr("letter-spacing", "0.02em")
    .style("paint-order", "stroke")
    .style("stroke", "#0d0f14")
    .style("stroke-width", "2.5px")
    .text(d => COUNTRY_NAMES[nodeSet[d.index]] || nodeSet[d.index]);

  g.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", "-0.9em")
    .attr("fill", "rgba(255,255,255,0.15)")
    .attr("font-family", "monospace")
    .attr("font-size", "8px")
    .attr("letter-spacing", "0.2em")
    .text("HS27 ENERGY");

  g.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", "0.7em")
    .attr("fill", "#3b82f6")
    .attr("font-family", "'Inter',sans-serif")
    .attr("font-size", "22px")
    .attr("font-weight", "300")
    .text(region === "All" ? "Global" : region.replace("/", " / "));

  g.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", "2.5em")
    .attr("fill", "rgba(255,255,255,0.45)")
    .attr("font-family", "monospace")
    .attr("font-size", "9px")
    .attr("letter-spacing", "0.08em")
    .text("RIBBONS: EXPORTER → IMPORTER");

  function applyFocus() {
    if (!focusedNode) {
      ribbonG.selectAll("path")
        .attr("opacity", 0.5)
        .attr("stroke", "rgba(255,255,255,0.08)")
        .attr("stroke-width", 0.5);

      arcG.selectAll("path").attr("opacity", 1);
      arcG.selectAll("text").attr("opacity", 1);
      return;
    }

    const fi = nodeIndex[focusedNode];

    ribbonG.selectAll("path")
      .attr("opacity", d => d.source.index === fi || d.target.index === fi ? 0.85 : 0.04)
      .attr("stroke", d => d.source.index === fi || d.target.index === fi ? "white" : "transparent")
      .attr("stroke-width", d => d.source.index === fi || d.target.index === fi ? 1 : 0);

    arcG.selectAll("g path:first-child")
      .attr("opacity", d => d.index === fi ? 1 : 0.2);

    arcG.selectAll("text")
      .attr("opacity", d => d.index === fi ? 1 : 0.2);
  }

  focusedNode = null;
}

const params = new URLSearchParams(window.location.search);
const regionParam = params.get("region") || "All";

const regionMap = {
  "All": "All",
  "Americas": "Americas",
  "Europe / CIS": "Europe/CIS",
  "Middle East": "Middle East",
  "Asia / Pacific": "Asia/Pacific",
  "Africa": "Africa",
};

const d3Region = regionMap[regionParam] || regionParam;
drawChord(d3Region);

window.addEventListener("message", function(event) {
  const r = regionMap[event.data] || event.data;
  drawChord(r);
});
</script>
</body>
</html>
